<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline - ReadLoot</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: Inter, system-ui, sans-serif;
        background-color: hsl(30 20% 98%);
        color: hsl(240 10% 10%);
        display: flex;
        min-height: 100vh;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 1rem;
      }
      h1 {
        font-size: 2rem;
        font-weight: 700;
        color: hsl(262 80% 50%);
        margin-bottom: 0.75rem;
      }

        color: hsl(240 5% 45%);
        font-size: 1rem;
        line-height: 1.5;
      }

  <body>
    <div>
      <h1>You are offline</h1>
      <p>Please check your connection and try again.</p>

</html>
